name: Build All Mods

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build all subprojects
        working-directory: Organizations/infrastructureSickos/InfrastructureSickos
        run: ./gradlew build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: 'Organizations/infrastructureSickos/InfrastructureSickos/*/build/libs/*.jar'
          if-no-files-found: warn
