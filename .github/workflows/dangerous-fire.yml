name: DangerousFire — Build and Publish

on:
  push:
    branches: [ main ]
    tags:
      - 'dangerous-fire-v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Organizations/infrastructureSickos/InfrastructureSickos
    outputs:
      mod_version: ${{ steps.props.outputs.mod_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read mod version
        id: props
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          echo "mod_version=${MOD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build dangerous-fire jar
        run: ./gradlew :dangerous-fire:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dangerous-fire-jar
          path: Organizations/infrastructureSickos/InfrastructureSickos/dangerous-fire/build/libs/dangerous-fire-${{ steps.props.outputs.mod_version }}.jar
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Organizations/infrastructureSickos/InfrastructureSickos
    if: startsWith(github.ref, 'refs/tags/dangerous-fire-v')
    outputs:
      modrinth_version_id: ${{ steps.publish.outputs.modrinth_version_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: dangerous-fire-jar
          path: Organizations/infrastructureSickos/InfrastructureSickos/dangerous-fire/build/libs/

      - name: Publish to Modrinth
        id: publish
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          MOD_VERSION: ${{ needs.build.outputs.mod_version }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          JAR_FILE="dangerous-fire/build/libs/dangerous-fire-${MOD_VERSION}.jar"

          DATA=$(python3 -c "
          import json
          data = {
              'name': 'DangerousFire ${TAG}',
              'version_number': '${TAG}',
              'version_type': 'release',
              'project_id': 'dangerous-fire-is',
              'dependencies': [],
              'game_versions': ['1.20.1'],
              'loaders': ['forge'],
              'featured': True,
              'file_parts': ['jar']
          }
          print(json.dumps(data))
          ")

          RESPONSE=$(curl -sf \
            -H "Authorization: ${MODRINTH_API_TOKEN}" \
            -F "data=${DATA}" \
            -F "jar=@${JAR_FILE};type=application/java-archive" \
            "https://api.modrinth.com/v2/version")

          MODRINTH_VERSION_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Published to Modrinth: version_id=${MODRINTH_VERSION_ID}"
          echo "modrinth_version_id=${MODRINTH_VERSION_ID}" >> "$GITHUB_OUTPUT"

  update-modpack:
    needs: [build, publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Trigger modpack update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MODPACK_DISPATCH_TOKEN }}
          repository: infrastructureSickos/minecraft-modpack
          event-type: dangerous-fire-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
